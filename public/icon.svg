<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#003DA5"/>

  <!-- Cricket ball outline (subtle) -->
  <circle cx="32" cy="32" r="20" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" fill="none"/>

  <!-- Seam arcs in saffron -->
  <path d="M14 32 Q32 10 50 32" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M14 32 Q32 54 50 32" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- K letter -->
  <text x="32" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="900" fill="#FFFFFF">K</text>
</svg>
